<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="componenti.js" defer></script>
    <title>Giochiamoci! - Contatti</title>
</head>
<body>
    <header-sito></header-sito>
    <main>
        <!-- **SEZIONE CONTATTI** -->
        <section id="contatti" tabindex="-1">
            <h2>Contatti</h2>
            <p>Siamo sempre in cerca di nuove collaborazioni! Che tu sia una persona, un’associazione, un’azienda o un’altra realtà, puoi contattarci tramite il form sottostante e diventare parte del nostro percorso.</p>
            <div class="accessibile">
                <h3>Form di contatto</h3>
                <form action="https://formsubmit.co/tuoindirizzo@email.com" method="POST">
    
                    <!-- CAMPO: NOME E COGNOME -->
                    <label for="nome-cognome">Nome e cognome (obbligatorio):</label>
                    <input type="text" id="nome-cognome" name="nome_cognome" required>
                    
                    <!-- CAMPO: EMAIL -->
                    <label for="email">Indirizzo mail (obbligatorio):</label>
                    <input type="email" id="email" name="email" required>
                    
                    <!-- CAMPO: SOCIETÀ/ENTE -->
                    <label for="ente-azienda">Società, ente o azienda (facoltativo):</label>
                    <input type="text" id="ente-azienda" name="ente_azienda">
                    
                    <!-- CAMPO: MOTIVAZIONE (MENÙ A TENDINA) -->
                    <label for="motivo-contatto">Perché ci contatti?</label>
                    <select id="motivo-contatto" name="motivo_contatto" required>
                        <option value="" disabled selected>Seleziona un'opzione...</option>
                        <option value="diventare-socia">Diventare socia</option>
                        <option value="invito-evento">Invitarvi in uno spazio-evento</option>
                        <option value="costruire-gioco">Costruire un gioco accessibile</option>
                        <option value="altro">Altro</option>
                    </select>
                    
                    <!-- CAMPO: MESSAGGIO -->
                    <label for="messaggio">Spazio per scrivere:</label>
                    <textarea id="messaggio" name="messaggio" rows="6" required></textarea>
                    
                    <!-- BOTTONE DI INVIO -->
                    <button type="submit">Invia messaggio</button>
                
                </form>
            </div>
            <div class="top-link-box">
                <a href="#top">Torna su</a>
            </div>
        </section>        
    </main>
    <footer-sito></footer-sito>   
</body>
</html>
